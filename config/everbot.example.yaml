# EverBot 配置示例

everbot:
  enabled: true

  # Agent 运行后端（provider）
  # provider: dolphin       # 默认 dolphin（进程内）；可设为 milkie 切到 milkie serve sidecar 后端。
  #                         # milkie 是软默认演进方向：未来全局默认会逐步切到 milkie。
  # milkie:                 # provider=milkie（或任一 agent provider=milkie）时生效：
  #   dist_path: ~/dev/github/milkie/dist/cli/index.js  # milkie serve CLI 入口；默认 ../milkie/dist/cli/index.js（相对 alfred 仓库）
  #   data_dir_root: ~/.alfred/milkie  # 每个 agent 的 milkie 会话/状态持久化根目录
  #   node_bin: /opt/homebrew/bin/node  # 启动 milkie serve 的 node 可执行。
  #                         # ⚠️ 强烈建议填**绝对路径**(#91):daemon(launchd)与交互 shell 的
  #                         # PATH 常解析到不同 node,原生模块(better-sqlite3)按某 node 编译后,
  #                         # 另一 node 加载即 NODE_MODULE_VERSION 不匹配崩溃。裸 `node` 走 PATH
  #                         # → `bin/everbot doctor` 报 WARN(daemon/service 模式 ERROR)。
  #   ready_timeout: 20.0   # 等待 serve 打印 MILKIE_SERVE_READY 就绪信号的超时（秒）

  # Web UI 配置
  web:
    api_key: ""  # 留空则不启用认证；设置后所有 API 需携带此 key

  runtime:
    job_retention_days: 7           # archived job session 保留天数
    job_max_archived_sessions: 200  # 每个实例最多保留的 archived job session 数量
    job_cleanup_interval_seconds: 600  # 清理轮询间隔（秒）
    scheduler_cron_jobs: true       # true=inline/isolated 分流；false=回退 heartbeat 统一执行

  # Channel 配置
  channels:
    telegram:
      enabled: false
      bot_token: "${TELEGRAM_BOT_TOKEN}"
      default_agent: "daily_insight"
      # allowed_chat_ids: ["123456789"]

  # Agent 配置
  agents:
    # 示例 Agent: daily_insight
    daily_insight:
      workspace: ~/.alfred/agents/daily_insight
      # provider: milkie    # 每 agent 覆盖全局 provider（dolphin/milkie）。
      #                      # 注意：在全局 provider=milkie 下，绑定 telegram 频道的 agent 会自动
      #                      # 回退到 dolphin（milkie 暂不支持 telegram serving，待 milkie#87）。
      #                      # ⚠️ 不要对 telegram-serving agent 显式设 provider: milkie —— 会绕过
      #                      #    自动回退,收到消息时 skillkit 注册失败 → turn 被静默丢弃(待 milkie#87)。
      heartbeat:
        enabled: true
        interval: 30          # 心跳间隔（分钟）
        night_interval: 120   # 夜间（active_hours 以外）心跳间隔（分钟）；不设或<=0则夜间不运行
        inspect_interval: 30  # Inspector 巡查间隔（分钟）；仅在 active_hours 内运行
        # inspect_night_interval: 120  # Inspector 夜间间隔（分钟）；不设则夜间不运行
        active_hours: [8, 22] # 活跃时段 8:00-22:00
        max_retries: 3        # 最大重试次数
        ack_max_chars: 300    # HEARTBEAT_OK suppress 阈值
        realtime_status_hint: true  # deliver 后是否推送状态提示
        broadcast_scope: agent      # heartbeat 事件广播粒度: session|agent
        routine_reflection: true    # 无到期任务时是否启用 routine 反思注册

    # 示例 Agent: research（心跳未启用）
    research:
      workspace: ~/.alfred/agents/research
      heartbeat:
        enabled: false

# 日志配置
logging:
  level: INFO
  file: ~/.alfred/logs/everbot.log
