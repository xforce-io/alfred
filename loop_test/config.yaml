agent:
  ws_url: "ws://localhost:8765/ws/chat/{agent_name}"
  agent_name: "demo_agent"
  api_key: ""  # optional, leave empty if not required
  everbot_bin: "bin/everbot"  # path to everbot launcher (relative to project_root)

claude:
  command: "claude"
  flags: ["-p", "--dangerously-skip-permissions"]  # need skip-permissions for accessing ~/.alfred
  timeout: 600   # max seconds per claude invocation

paths:
  alfred_home: "~/.alfred"  # where agent logs/traces live
  project_root: "."         # project root for test/code modifications

loop:
  max_iterations: 5  # default max loop iterations per case
