cases:
  - id: coding
    query: "先帮我审查下quantitative_trading代码，昨天加了 etf ranking 相关的逻辑（1）前端总有问题（2）数据似乎有问题"
    expectation: "任务成功"
    max_loops: 3

  - id: routine_scanner_gate
    query: "帮我注册一个定时任务：每两分钟检测一次会话，看会话轨迹是否有问题。要求用 session scanner 做变化检测门控，用轨迹review技能（trajectory-reviewer）来分析。执行模式用 isolated。"
    expectation: "任务注册成功，可以通过 list routines 验证：schedule 为 2m，scanner 为 session，skill 为 trajectory-reviewer，execution_mode 为 isolated"
    max_loops: 3
    # Clean up test routine between iterations to ensure idempotency
    cleanup_cmd: "python skills/routine-manager/scripts/routine_cli.py --workspace ~/.alfred/agents/demo_agent list --format json 2>/dev/null | python3 -c \"import sys,json; data=json.load(sys.stdin); [print(t['id']) for t in data.get('data',[]) if '轨迹' in t.get('title','') or 'trajectory' in t.get('title','').lower()]\" | xargs -I{} python skills/routine-manager/scripts/routine_cli.py --workspace ~/.alfred/agents/demo_agent remove --id {} --hard 2>/dev/null || true"
